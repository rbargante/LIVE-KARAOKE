x<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carlos Karaoke Live</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; }
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.08); }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 12px 14px; }
    .logo { font-weight: 800; font-size: 18px; letter-spacing: .5px; }
    .nav-links { display: flex; gap: 14px; flex-wrap: wrap; }
    .nav-links a { color: #d0d0d0; text-decoration: none; font-size: 14px; font-weight: 700; padding: 8px 10px; border-radius: 10px; }
    .nav-links a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .container { max-width: 1120px; margin: 0 auto; padding: 14px; }
    h1, h2, h3 { margin: 0; text-align: center; }
    h1 { font-size: 48px; margin-bottom: 14px; }
    .section-title { margin-top: 44px; margin-bottom: 16px; font-size: 34px; }
    .section-sub { text-align: center; color: #bdbdbd; margin: 0 0 18px; font-size: 15px; }
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
    #live-status-badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; font-size: 14px; font-weight: 700; background: #2b2b2b; color: #d7d7d7; border: 1px solid rgba(255,255,255,.12); }
    #live-status-dot { width: 10px; height: 10px; border-radius: 50%; background: #666; display: inline-block; }
    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
    .player iframe, .player video { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; }
    .controls { position: absolute; right: 14px; bottom: 14px; z-index: 20; display: flex; gap: 10px; flex-wrap: wrap; }
    .control-btn { background: rgba(0,0,0,.78); color: #fff; border: 1px solid rgba(255,255,255,.16); padding: 12px 14px; border-radius: 12px; font-size: 15px; cursor: pointer; min-height: 46px; font-weight: 700; text-decoration: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; }
    .card { background: #0d0d0d; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
    .replay-card { cursor: pointer; transition: transform .2s ease; }
    .replay-card:hover { transform: scale(1.03); }
    .card img { width: 100%; display: block; aspect-ratio: 16 / 9; object-fit: cover; background: #111; }
    .card p { margin: 0; padding: 10px 12px 14px; font-size: 14px; line-height: 1.4; }
    .admin-input { padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); font-size: 16px; background: #f2f2f2; color: #111; box-sizing: border-box; width: 100%; margin-bottom: 10px; }
    .view-more-btn { background: none; color: #d8d8d8; border: none; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: underline; width: 100%; }
    .site-footer { margin-top: 44px; padding: 24px 12px; border-top: 1px solid rgba(255,255,255,.08); text-align: center; color: #a7a7a7; font-size: 14px; }
    
    /* POP-UP WHATSAPP FLUTUANTE */
    #wa-popup { position: fixed; bottom: 20px; left: 20px; z-index: 1000; transition: transform 0.3s ease; }
    #wa-popup:hover { transform: scale(1.1); }
    #wa-popup img { width: 60px; height: 60px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }

    #backToTop { position: fixed; right: 20px; bottom: 20px; background: #f52a1f; color: #fff; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 18px; cursor: pointer; display: none; z-index: 999; }
  </style>
</head>
<body>
  
  <div id="wa-popup"></div>

  <div class="top-nav">
    <div class="nav-inner">
      <div class="logo">Carlos Karaoke Live</div>
      <div class="nav-links">
        <a href="#top">Início</a>
        <a href="#videos">Vídeos</a>
        <a href="#eventos">Serviços</a>
        <a href="#" onclick="toggleAdminLogin(); return false;">Admin</a>
      </div>
    </div>
  </div>

  <div class="container" id="top">
    <h1>Carlos Karaoke Live</h1>

    <div class="badge-wrap" id="badgeWrap">
      <div id="live-status-badge">
        <span id="live-status-dot"></span>
        <span id="live-status-text">A VERIFICAR...</span>
      </div>
    </div>

    <div class="player" id="playerWrap">
      <iframe id="livePlayer" src="https://player.kick.com/carloskaraoke?muted=true" allow="autoplay; fullscreen" allowfullscreen></iframe>
      <div class="controls">
        <button class="control-btn" id="unmuteBtn">🔊 SOM</button>
        <button class="control-btn" id="backToLiveBtn" style="display:none; background: rgba(255,255,255,.12);">⬅ VOLTAR AO LIVE</button>
      </div>
    </div>

    <h2 class="section-title" id="videos">VÍDEOS</h2>
    <div id="replaysStatus" class="section-sub">A verificar biblioteca...</div>
    <div id="videosGrid" class="grid"></div>
    <div id="viewMoreWrap"></div>

    <h2 class="section-title" id="eventos">SERVIÇOS</h2>
    <div class="grid" id="servicesGrid"></div>

    <div id="adminSection" style="display:none; margin-top:40px;">
      <h2 class="section-title">ADMIN PANEL</h2>
      <div id="loginBox" class="card" style="max-width:400px; margin: 0 auto; padding: 20px;">
        <input id="adminUser" placeholder="User" class="admin-input">
        <input id="adminPass" type="password" placeholder="Pass" class="admin-input">
        <button class="control-btn" onclick="loginAdmin()" style="width:100%; background:#f52a1f;">ENTRAR</button>
      </div>

      <div id="adminPanel" style="display:none; max-width:800px; margin: 0 auto;">
        <div class="card" style="margin-bottom:20px; padding: 20px;">
          <h3>Configurações Gerais</h3>
          <label style="display:block; margin-bottom:5px; font-size:14px; color:#ccc;">Número WhatsApp (apenas números):</label>
          <input id="adminWhatsApp" placeholder="Ex: 351912345678" class="admin-input">
        </div>
        <div id="servicesEditList"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button class="control-btn" onclick="saveAdminData()" style="flex:1; background:#f52a1f;">GUARDAR TUDO</button>
          <button class="control-btn" onclick="logoutAdmin()" style="flex:1;">SAIR</button>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <strong>Carlos Karaoke Live</strong><br>
      © 2026 Carlos Karaoke Live
    </footer>
  </div>

  <button id="backToTop" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">↑</button>

  <script>
    let allVideos = [];
    let replayExpanded = false;
    const replayBaseCount = 8;

    const defaultData = {
      whatsapp: "351912345678",
      services: [
        { title: 'Karaoke ao vivo', style: 'Principal', image: 'https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=600', text: 'Animação total no local.' },
        { title: 'Festas privadas', style: 'Evento', image: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=600', text: 'Aniversários e grupos.' },
        { title: 'Online Live', style: 'Digital', image: 'https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=600', text: 'Karaoke via web.' }
      ]
    };

    function loadData() {
      const saved = localStorage.getItem('karaoke_data');
      return saved ? JSON.parse(saved) : defaultData;
    }

    function renderUI() {
      const data = loadData();
      
      // Render WhatsApp POP-UP Flutuante
      const waPop = document.getElementById('wa-popup');
      waPop.innerHTML = `
        <a href="https://wa.me/${data.whatsapp}" target="_blank" aria-label="WhatsApp">
          <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Pop-up">
        </a>`;

      // Render Services
      const grid = document.getElementById('servicesGrid');
      grid.innerHTML = data.services.map(s => `
        <div class="card">
          <img src="${s.image}">
          <div style="padding:15px; text-align:center;">
            <h3>${s.title}</h3>
            <div style="color:#ff6b6b; font-size:12px; font-weight:700; margin-top:5px;">${s.style}</div>
            <p>${s.text}</p>
          </div>
        </div>`).join('');
    }

    function toggleAdminLogin() {
      const sec = document.getElementById('adminSection');
      sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
      if(sec.style.display === 'block') sec.scrollIntoView();
    }

    function loginAdmin() {
      if(document.getElementById('adminUser').value === 'admin' && document.getElementById('adminPass').value === '1234') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        const data = loadData();
        document.getElementById('adminWhatsApp').value = data.whatsapp;
        document.getElementById('servicesEditList').innerHTML = data.services.map((s, i) => `
          <div class="card" style="margin-top:15px; padding: 20px;">
            <h4>Serviço ${i+1}</h4>
            <input id="s${i}t" value="${s.title}" class="admin-input">
            <input id="s${i}i" value="${s.image}" class="admin-input">
            <textarea id="s${i}x" class="admin-input">${s.text}</textarea>
          </div>
        `).join('');
      } else { alert('Dados incorretos'); }
    }

    function saveAdminData() {
      const data = loadData();
      data.whatsapp = document.getElementById('adminWhatsApp').value.replace(/\D/g, '');
      data.services = data.services.map((s, i) => ({
        title: document.getElementById(`s${i}t`).value,
        style: s.style,
        image: document.getElementById(`s${i}i`).value,
        text: document.getElementById(`s${i}x`).value
      }));
      localStorage.setItem('karaoke_data', JSON.stringify(data));
      renderUI();
      alert('Guardado!');
    }

    function logoutAdmin() {
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('adminSection').style.display = 'none';
    }

    async function loadVideos() {
      try {
        const res = await fetch('https://karaoke-videos.ricardobargante.workers.dev');
        allVideos = await res.json();
        document.getElementById('replaysStatus').textContent = `${allVideos.length} vídeos.`;
        renderVideos();
      } catch (e) { document.getElementById('replaysStatus').textContent = 'Erro vídeos.'; }
    }

    function renderVideos() {
      const count = replayExpanded ? allVideos.length : Math.min(allVideos.length, replayBaseCount);
      const grid = document.getElementById('videosGrid');
      grid.innerHTML = allVideos.slice(0, count).map(v => `
        <div class="card replay-card" onclick="loadReplay('${v.source}')">
          <img src="${v.thumbnail.src}">
          <p>${v.session_title}</p>
        </div>
      `).join('');
      const wrap = document.getElementById('viewMoreWrap');
      if(allVideos.length > replayBaseCount) {
        wrap.innerHTML = `<button class="view-more-btn" onclick="toggleVideos()">${replayExpanded ? 'VER MENOS' : 'VER MAIS'}</button>`;
      }
    }

    function toggleVideos() {
      replayExpanded = !replayExpanded;
      renderVideos();
      if(!replayExpanded) document.getElementById('videos').scrollIntoView();
    }

    function loadReplay(url) {
      document.getElementById('badgeWrap').style.display = 'none';
      const wrap = document.getElementById('playerWrap');
      wrap.innerHTML = `<video id="rep" controls autoplay style="width:100%; height:100%;"></video>
                        <div class="controls"><button class="control-btn" onclick="location.reload()">⬅ LIVE</button></div>`;
      const video = document.getElementById('rep');
      if (Hls.isSupported()) {
        const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
      } else { video.src = url; }
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function updateStatus() {
        try {
            const res = await fetch('https://script.google.com/macros/s/AKfycbzMvkIpTAEEORQKvh_hWNzLY5Y7A9k_kO6KmlqTAXbK-9MXE37rE5UqFGgZx0z8Kr-E/exec?action=status');
            const status = await res.text();
            const dot = document.getElementById('live-status-dot');
            const txt = document.getElementById('live-status-text');
            if(status.trim().toLowerCase() === 'live') {
                dot.style.background = '#ff3b3b'; txt.textContent = 'AO VIVO';
            } else {
                dot.style.background = '#666'; txt.textContent = 'OFFLINE';
            }
        } catch(e) {}
    }

    renderUI();
    loadVideos();
    updateStatus();
    setInterval(updateStatus, 60000);
    document.getElementById('unmuteBtn').onclick = () => {
        document.getElementById('livePlayer').src = "https://player.kick.com/carloskaraoke";
    };
    window.addEventListener('scroll', () => {
      document.getElementById('backToTop').style.display = window.scrollY > 400 ? 'block' : 'none';
    });
  </script>
</body>
</html>
