<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>os canta agora karaoke</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; line-height: 1.6; }
    
    /* Navegação Minimalista */
    .top-nav { position: sticky; top: 0; z-index: 999; background: rgba(0,0,0,.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.1); }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: flex-end; align-items: center; padding: 12px 16px; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a { color: #eee; text-decoration: none; font-size: 13px; font-weight: 600; padding: 6px 10px; border-radius: 8px; transition: 0.2s; }
    .nav-links a:hover { background: rgba(255,255,255,.1); }

    .container { max-width: 1120px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 2.5rem; text-align: center; margin: 20px 0; font-weight: 900; text-transform: lowercase; }
    .section-title { margin-top: 40px; margin-bottom: 10px; font-size: 1.8rem; text-align: center; text-transform: uppercase; }
    .section-sub { text-align: center; color: #aaa; margin-bottom: 24px; font-size: 14px; padding: 0 10px; }

    /* Player */
    .player { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .player iframe, .player video { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    .controls { position: absolute; bottom: 12px; right: 12px; z-index: 20; display: flex; gap: 8px; }
    .control-btn { background: rgba(0,0,0,.8); color: #fff; border: 1px solid rgba(255,255,255,.2); padding: 10px 16px; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: 700; backdrop-filter: blur(5px); }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.8rem; }
      .nav-links a { padding: 5px; font-size: 12px; }
    }

    .card { background: #0d0d0d; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); transition: 0.3s; }
    .card img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block; }
    .card-content { padding: 16px; text-align: center; }
    .card h3 { margin: 0; font-size: 1.2rem; }
    .card p { margin: 8px 0 0; color: #bbb; font-size: 14px; }

    .replay-card { cursor: pointer; }
    .replay-card:active { transform: scale(0.98); }

    .admin-input { padding: 14px; border-radius: 10px; border: 1px solid #333; font-size: 16px; background: #fff; color: #000; width: 100%; margin-bottom: 12px; }
    
    #wa-popup { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    #wa-popup img { width: 55px; height: 55px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }

    .site-footer { margin-top: 60px; padding: 40px 16px; border-top: 1px solid #222; text-align: center; color: #666; font-size: 13px; }
  </style>
</head>
<body>
  
  <div id="wa-popup"></div>

  <nav class="top-nav">
    <div class="nav-inner">
      <div class="nav-links">
        <a href="#videos">Vídeos</a>
        <a href="#eventos">Serviços</a>
        <a href="#" onclick="toggleAdminLogin(); return false;">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container" id="top">
    <h1>os canta agora karaoke</h1>

    <div class="player" id="playerWrap">
      <iframe id="livePlayer" src="https://player.kick.com/carloskaraoke?autoplay=true&muted=true" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
      <div class="controls">
        <button class="control-btn" id="unmuteBtn">🔊 SOM</button>
        <button class="control-btn" id="backToLiveBtn" style="display:none;">⬅ VOLTAR</button>
      </div>
    </div>

    <h2 class="section-title" id="videos">VÍDEOS</h2>
    <p class="section-sub" id="replaysStatus">A carregar momentos especiais...</p>
    <div id="videosGrid" class="grid"></div>
    <div id="viewMoreWrap" style="text-align: center; margin-top: 20px;"></div>

    <h2 class="section-title" id="eventos">NOSSOS SERVIÇOS</h2>
    <div class="grid" id="servicesGrid"></div>

    <div id="adminSection" style="display:none; margin-top:40px;">
      <h2 class="section-title">ADMINISTRAÇÃO</h2>
      <div id="loginBox" class="card" style="max-width:400px; margin: 0 auto; padding: 24px;">
        <input id="adminUser" placeholder="Utilizador" class="admin-input">
        <input id="adminPass" type="password" placeholder="Palavra-passe" class="admin-input">
        <button class="control-btn" onclick="loginAdmin()" style="width:100%; background:#f52a1f; border:none;">ENTRAR</button>
      </div>

      <div id="adminPanel" style="display:none; max-width:600px; margin: 0 auto;">
        <div class="card" style="padding: 20px; margin-bottom: 20px;">
          <h3>WhatsApp de Contacto</h3>
          <input id="adminWhatsApp" placeholder="Ex: 351912345678" class="admin-input">
        </div>
        <div id="servicesEditList"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button class="control-btn" onclick="saveAdminData()" style="flex:1; background:#28a745; border:none;">GUARDAR</button>
          <button class="control-btn" onclick="logoutAdmin()" style="flex:1;">SAIR</button>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <strong>os canta agora karaoke</strong><br>
      © 2026 • Todos os direitos reservados
    </footer>
  </div>

  <script>
    let allVideos = [];
    let replayExpanded = false;
    const replayBaseCount = 8;

    const defaultData = {
      whatsapp: "351912345678",
      services: [
        { title: 'Karaoke ao vivo', style: 'Evento Presencial', image: 'https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=600', text: 'Animação garantida para o seu bar ou restaurante.' },
        { title: 'Festas Privadas', style: 'Casamentos/Aniversários', image: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=600', text: 'Tornamos o seu dia especial inesquecível com muita música.' },
        { title: 'Live Stream', style: 'Entretenimento Digital', image: 'https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=600', text: 'Acompanhe as nossas sessões em direto a partir de qualquer lugar.' }
      ]
    };

    function loadData() {
      const saved = localStorage.getItem('karaoke_data');
      return saved ? JSON.parse(saved) : defaultData;
    }

    function renderUI() {
      const data = loadData();
      const waPop = document.getElementById('wa-popup');
      waPop.innerHTML = `<a href="https://wa.me/${data.whatsapp}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp"></a>`;

      const grid = document.getElementById('servicesGrid');
      grid.innerHTML = data.services.map(s => `
        <div class="card">
          <img src="${s.image}" alt="${s.title}">
          <div class="card-content">
            <div style="color:#f52a1f; font-size:11px; font-weight:800; text-transform:uppercase;">${s.style}</div>
            <h3>${s.title}</h3>
            <p>${s.text}</p>
          </div>
        </div>`).join('');
    }

    function toggleAdminLogin() {
      const sec = document.getElementById('adminSection');
      sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
      if(sec.style.display === 'block') window.scrollTo({top: sec.offsetTop - 100, behavior: 'smooth'});
    }

    function loginAdmin() {
      if(document.getElementById('adminUser').value === 'admin' && document.getElementById('adminPass').value === '1234') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        const data = loadData();
        document.getElementById('adminWhatsApp').value = data.whatsapp;
        document.getElementById('servicesEditList').innerHTML = data.services.map((s, i) => `
          <div class="card" style="margin-top:15px; padding: 15px;">
            <h4 style="margin:0 0 10px">Editar Serviço ${i+1}</h4>
            <input id="s${i}t" value="${s.title}" class="admin-input" placeholder="Título">
            <input id="s${i}i" value="${s.image}" class="admin-input" placeholder="Link da Imagem">
            <textarea id="s${i}x" class="admin-input" rows="3" placeholder="Descrição">${s.text}</textarea>
          </div>`).join('');
      } else { alert('Acesso Negado'); }
    }

    function saveAdminData() {
      const data = loadData();
      data.whatsapp = document.getElementById('adminWhatsApp').value.replace(/\D/g, '');
      data.services = data.services.map((s, i) => ({
        title: document.getElementById(`s${i}t`).value,
        style: s.style,
        image: document.getElementById(`s${i}i`).value,
        text: document.getElementById(`s${i}x`).value
      }));
      localStorage.setItem('karaoke_data', JSON.stringify(data));
      renderUI();
      alert('Alterações guardadas!');
      logoutAdmin();
    }

    function logoutAdmin() {
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('adminSection').style.display = 'none';
    }

    async function loadVideos() {
      try {
        const res = await fetch('https://karaoke-videos.ricardobargante.workers.dev');
        allVideos = await res.json();
        document.getElementById('replaysStatus').textContent = `Assista a ${allVideos.length} momentos gravados`;
        renderVideos();
      } catch (e) { document.getElementById('replaysStatus').textContent = 'Vídeos indisponíveis.'; }
    }

    function renderVideos() {
      const count = replayExpanded ? allVideos.length : Math.min(allVideos.length, replayBaseCount);
      const grid = document.getElementById('videosGrid');
      grid.innerHTML = allVideos.slice(0, count).map(v => `
        <div class="card replay-card" onclick="loadReplay('${v.source}')">
          <img src="${v.thumbnail.src}" alt="Video">
          <div style="padding:12px; font-weight:600; font-size:13px;">${v.session_title}</div>
        </div>`).join('');

      const btnWrap = document.getElementById('viewMoreWrap');
      if(allVideos.length > replayBaseCount) {
        btnWrap.innerHTML = `<button class="view-more-btn" onclick="toggleVideos()">${replayExpanded ? 'MOSTRAR MENOS' : 'VER TODOS OS VÍDEOS'}</button>`;
      }
    }

    function toggleVideos() {
      replayExpanded = !replayExpanded;
      renderVideos();
      if(!replayExpanded) document.getElementById('videos').scrollIntoView({behavior: 'smooth'});
    }

    function loadReplay(url) {
      const wrap = document.getElementById('playerWrap');
      wrap.innerHTML = `<video id="rep" controls autoplay playsinline style="width:100%; height:100%; background:#000;"></video>
                        <div class="controls"><button class="control-btn" onclick="location.reload()">⬅ LIVE</button></div>`;
      const video = document.getElementById('rep');
      if (Hls.isSupported()) {
        const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
      } else { video.src = url; }
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    renderUI();
    loadVideos();
    
    document.getElementById('unmuteBtn').onclick = () => { 
        document.getElementById('livePlayer').src = "https://player.kick.com/carloskaraoke?autoplay=true"; 
    };
  </script>
</body>
</html>
