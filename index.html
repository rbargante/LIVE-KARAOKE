<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Live - Admin</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* MENU SUPERIOR CORRIGIDO (FULL TEXT) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }

        nav { display: flex; align-items: center; gap: 15px; }
        nav a { 
            color: #efefef; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .btn-admin {
            border: 1px solid #444;
            padding: 6px 14px;
            border-radius: 4px;
            background: #1a1a1a;
            color: #fff !important;
        }

        /* CONTEÚDO E CARDS */
        .main-container { padding: 15px; max-width: 500px; margin: 0 auto; }
        
        .card {
            background: #111;
            border-radius: 18px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
            text-align: center;
        }

        .img-banner {
            width: 100%;
            border-radius: 15px 15px 0 0;
            display: block;
            margin-bottom: -1px;
        }

        .painel-global { text-align: left; padding: 25px; }
        .painel-global h2 { 
            font-size: 1.4rem; 
            margin-bottom: 25px; 
            text-align: center; 
            letter-spacing: 1px;
        }
        
        .row-option {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px;
            background: #181818;
            border-radius: 10px;
        }

        .row-option label {
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            flex-grow: 1;
        }

        input[type="checkbox"] { 
            width: 22px; 
            height: 22px; 
            accent-color: #fff;
            cursor: pointer; 
        }

        /* AJUSTE MOBILE PARA NÃO REBENTAR */
        @media (max-width: 400px) {
            nav { gap: 8px; }
            nav a { font-size: 11px; }
            .logo { font-size: 0.85rem; }
            header { padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KARAOKE LIVE</div>
        <nav>
            <a href="/">HOME</a>
            <a href="/dashboard">DASHBOARD</a>
            <a href="/admin" class="btn-admin">ADMIN</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="card" style="padding:0; overflow:hidden;">
            <img src="https://via.placeholder.com/500x200/222/fff?text=KARAOKE+BANNER" class="img-banner" alt="Banner">
            <div style="padding: 30px;">
                <h2>TEST</h2>
                <p style="color: #666; margin-top: 5px;">test</p>
            </div>
        </div>

        <div class="card painel-global">
            <h2>PAINEL GLOBAL</h2>
            
            <div class="row-option">
                <input type="checkbox" id="infoLiveCheck">
                <label for="infoLiveCheck">MOSTRAR INFO LIVE</label>
            </div>

            <div class="row-option">
                <input type="checkbox" id="chatCheck">
                <label for="chatCheck">MOSTRAR CHAT</label>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Teu Firebase Config (mantendo o que já tinhas)
        const firebaseConfig = {
            databaseURL: "https://karaoke-live-online-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const infoCheck = document.getElementById('infoLiveCheck');
        const chatCheck = document.getElementById('chatCheck');

        // Sincronizar estado inicial e mudanças remotas
        onValue(ref(db, 'configuracoes'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                infoCheck.checked = data.mostrarInfoLive;
                chatCheck.checked = data.mostrarChat;
            }
        });

        // Gravar no Firebase ao clicar
        infoCheck.addEventListener('change', () => {
            set(ref(db, 'configuracoes/mostrarInfoLive'), infoCheck.checked);
        });

        chatCheck.addEventListener('change', () => {
            set(ref(db, 'configuracoes/mostrarChat'), chatCheck.checked);
        });
    </script>
</body>
</html>
