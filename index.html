<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carlos Karaoke Live</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {margin:0;background:#000;color:#fff;font-family:Arial}
.top-nav {position:sticky;top:0;background:#000;padding:12px;border-bottom:1px solid #222}
.nav-links {display:flex;gap:14px;justify-content:center}
.nav-links a {color:#ccc;text-decoration:none;font-weight:700}
.container {max-width:1100px;margin:auto;padding:14px}
h1 {text-align:center;font-size:40px}
.player {position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden}
.player iframe,.player video {width:100%;height:100%}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.card {background:#111;border-radius:12px;overflow:hidden}
.card img {width:100%;aspect-ratio:16/9;object-fit:cover}
.card p {padding:10px}
button {padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
</style>
</head>

<body>

<div class="top-nav">
<div class="nav-links">
<a href="#top">Início</a>
<a href="#videos">Vídeos</a>
<a href="#servicos">Serviços</a>
<a href="#contacto">Contacto</a>
<a href="#" onclick="toggleAdmin();return false;">Admin</a>
</div>
</div>

<div class="container" id="top">
<h1>Carlos Karaoke Live</h1>

<div class="player" id="playerWrap">
<iframe id="livePlayer" src="https://player.kick.com/carloskaraoke?muted=true"></iframe>
<button id="soundBtn" onclick="unmute()" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:red;color:white;z-index:5;">🔊 Ativar Som</button>
</div>

<h2 id="videos">VÍDEOS</h2>
<div id="videosGrid" class="grid"></div>
<div style="text-align:center;margin-top:10px">
<button onclick="toggleVideos()">Ver mais / menos</button>
</div>

<h2 id="servicos">SERVIÇOS</h2>
<div id="servicesGrid" class="grid"></div>

<div id="admin" style="display:none;margin-top:30px">
<h3>Admin</h3>
<input id="pass" placeholder="password">
<button onclick="login()">Entrar</button>

<div id="panel" style="display:none">
<input id="s1" placeholder="Serviço 1">
<input id="s2" placeholder="Serviço 2">
<input id="s3" placeholder="Serviço 3">
<button onclick="save()">Guardar</button>
</div>
</div>

<h2 id="contacto">CONTACTO</h2>
<p style="text-align:center">WhatsApp</p>
<footer style="text-align:center;margin-top:30px;color:#888;font-size:14px;line-height:1.6;">
Carlos Karaoke Live, karaoke ao vivo, festas privadas e eventos especiais.
</footer>

</div>

<script>
let videos=[]
let expanded=false

async function loadVideos(){
try{
const r=await fetch('https://karaoke-videos.ricardobargante.workers.dev')
const d=await r.json()
videos=d
}catch{
videos=[]
}
renderVideos()
}

function renderVideos(){
const c=document.getElementById('videosGrid')
c.innerHTML=''
const list=expanded?videos:videos.slice(0,6)
list.forEach(v=>{
const el=document.createElement('div')
el.className='card'
el.innerHTML=`<img src="${v.thumbnail?.src||''}"><p>${v.session_title||''}</p>`
el.onclick=()=>play(v.source)
c.appendChild(el)
})
}

function toggleVideos(){
expanded=!expanded
renderVideos()
}

function play(url){
document.getElementById('playerWrap').innerHTML=`<video src="${url}" controls autoplay playsinline style="width:100%;height:100%"></video><button onclick="loadLive()" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:red;color:white;z-index:5;">Voltar Live</button>`
}" controls autoplay></video><button onclick="loadLive()">Voltar Live</button>`
}

function loadLive(){
document.getElementById('playerWrap').innerHTML=`<iframe id="livePlayer" src="https://player.kick.com/carloskaraoke?muted=true"></iframe><button id="soundBtn" onclick="unmute()" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:red;color:white;z-index:5;">🔊 Ativar Som</button>`
}

function renderServices(){
const s=JSON.parse(localStorage.getItem('services'))||[
{name:'Karaoke ao vivo',img:'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1200&q=80'},
{name:'Festas privadas',img:'https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=1200&q=80'},
{name:'Eventos especiais',img:'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1200&q=80'}
]
const g=document.getElementById('servicesGrid')
g.innerHTML=''
s.forEach(x=>{
const d=document.createElement('div')
d.className='card'
d.innerHTML=`<img src="${x.img}" alt="${x.name}"><p>${x.name}</p>`
g.appendChild(d)
})
}</p>`
g.appendChild(d)
})
}

function toggleAdmin(){
document.getElementById('admin').style.display='block'
}

function login(){
if(document.getElementById('pass').value==='1234'){
document.getElementById('panel').style.display='block'
}
}

function save(){
const arr=[
{name:document.getElementById('s1').value || 'Karaoke ao vivo',img:'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1200&q=80'},
{name:document.getElementById('s2').value || 'Festas privadas',img:'https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=1200&q=80'},
{name:document.getElementById('s3').value || 'Eventos especiais',img:'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1200&q=80'}
]
localStorage.setItem('services',JSON.stringify(arr))
renderServices()
}

function unmute(){
const iframe=document.getElementById('livePlayer')
if(iframe) iframe.src='https://player.kick.com/carloskaraoke'
}

loadVideos()
renderServices()
</script>

</body>
</html>
